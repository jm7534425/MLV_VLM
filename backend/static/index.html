<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>아동 그림 발달 분석</title>
<style>
:root{
  --accent:#5b6ef5; --accent2:#8a6cf0; --ink:#1c2230; --sub:#6b7280;
  --line:#e7eaf0; --bg:#eef1f6; --card:#fff; --good:#3ec487; --warn:#f0a93b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,"Segoe UI","Malgun Gothic",sans-serif;background:var(--bg);color:var(--ink);height:100vh;overflow:hidden;display:flex;flex-direction:column}
header{background:linear-gradient(100deg,#2b2f6b,#5b6ef5);color:#fff;padding:14px 26px;display:flex;align-items:center;gap:10px}
header h1{font-size:17px;font-weight:700}
header .tag{font-size:11px;background:rgba(255,255,255,.2);padding:2px 8px;border-radius:20px}

.wrap{flex:1;display:grid;grid-template-columns:380px 1fr;gap:18px;padding:18px 26px 10px;min-height:0}
.col{display:flex;flex-direction:column;gap:14px;min-height:0}
.card{background:var(--card);border-radius:16px;padding:18px;box-shadow:0 2px 10px rgba(30,40,80,.06)}
.card h2{font-size:12px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px}

/* 좌: 업로드 */
#drop{border:2px dashed #c3cad8;border-radius:12px;flex:1;display:flex;align-items:center;justify-content:center;text-align:center;color:#9aa3b2;cursor:pointer;transition:.15s;min-height:200px;overflow:hidden}
#drop.hover{border-color:var(--accent);background:#f0f3ff}
#drop.has img{max-width:100%;max-height:300px;border-radius:10px}
.uploadcard{flex:1;display:flex;flex-direction:column}
.tasks{display:flex;flex-wrap:wrap;gap:7px}
.tasks button{padding:7px 13px;border:1px solid var(--line);background:#fff;border-radius:20px;cursor:pointer;font-size:13px;color:#4b5563;transition:.15s}
.tasks button.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.tasks button:disabled{opacity:.4;cursor:not-allowed}
#run{margin-top:12px;width:100%;padding:13px;border:0;border-radius:12px;background:linear-gradient(100deg,var(--accent),var(--accent2));color:#fff;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 4px 14px rgba(91,110,245,.35)}
#run:disabled{background:#b9c0d4;box-shadow:none;cursor:not-allowed}

/* 우: 결과 */
.result-col{overflow:auto;min-height:0}
#empty{flex:1;display:flex;align-items:center;justify-content:center;color:#aab1c0;font-size:14px;flex-direction:column;gap:8px}
#empty .big{font-size:40px;opacity:.5}

/* 발달단계 스텝퍼 */
.stepper{display:flex;gap:4px;margin:4px 0 6px}
.step{flex:1;text-align:center}
.step .dot{height:7px;border-radius:4px;background:#e3e7f0;transition:.2s}
.step.done .dot{background:#c4ccf7}
.step.cur .dot{background:linear-gradient(90deg,var(--accent),var(--accent2));box-shadow:0 0 0 3px rgba(91,110,245,.18)}
.step .lab{font-size:10px;color:#9aa3b2;margin-top:5px;white-space:nowrap}
.step.cur .lab{color:var(--accent);font-weight:700}

.stage-head{display:flex;align-items:baseline;gap:10px;margin:14px 0 4px}
.stage-head .name{font-size:26px;font-weight:800}
.stage-head .conf{font-size:13px;color:var(--sub)}
.conf b{color:var(--good)}

.cap{color:#374151;line-height:1.6;font-size:14px;background:#f7f8fb;border-radius:10px;padding:11px 13px;margin:12px 0}
.ev{color:#5b6577;font-size:13px;line-height:1.55;border-left:3px solid var(--accent);padding:2px 0 2px 11px;margin:10px 0}

/* 품질 */
.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px 22px;margin-top:6px}
.qrow{font-size:13px}
.qrow .top{display:flex;justify-content:space-between;color:#4b5563;margin-bottom:4px}
.qrow .top b{color:var(--ink)}
.track{height:8px;background:#eceff5;border-radius:5px;overflow:hidden}
.track>i{display:block;height:100%;border-radius:5px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s}

.meta{color:#9aa3b2;font-size:11px;margin-top:14px;border-top:1px solid var(--line);padding-top:9px;display:flex;gap:12px;flex-wrap:wrap}
.fb-placeholder{color:#aab1c0;font-size:13px;border:1px dashed #d6dbe6;border-radius:10px;padding:12px;text-align:center}
.spinner{width:26px;height:26px;border:3px solid #dde2ee;border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err{color:#d34a4a}

/* history 하단 스트립 */
.histbar{padding:10px 26px 14px;display:flex;align-items:center;gap:12px;overflow-x:auto;background:transparent}
.histbar .htitle{font-size:11px;color:var(--sub);font-weight:700;text-transform:uppercase;flex-shrink:0}
.hchip{flex-shrink:0;display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:6px 10px;cursor:pointer;transition:.15s}
.hchip:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(91,110,245,.15)}
.hchip img{width:34px;height:34px;object-fit:cover;border-radius:6px}
.hchip .ht{font-size:12px;line-height:1.3}
.hchip .ht .s{font-weight:700}
.hchip .ht .c{color:#9aa3b2;font-size:11px}
.hidden{display:none}
</style>
</head>
<body>
<header><h1>🎨 아동 그림 발달 분석</h1><span class="tag">prototype</span></header>

<div class="wrap">
  <!-- 좌: 입력 -->
  <div class="col">
    <div class="card uploadcard">
      <h2>그림 업로드</h2>
      <div id="drop">클릭 또는 드래그<input type="file" id="file" accept="image/*" class="hidden"></div>
      <h2 style="margin-top:16px">작업</h2>
      <div class="tasks" id="tasks">
        <button data-task="evaluation" class="active">발달 평가</button>
        <button disabled>유사검색·5주</button>
        <button disabled>캡셔닝·6주</button>
        <button disabled>피드백·7주</button>
        <button disabled>편집·8주</button>
      </div>
      <button id="run" disabled>분석하기</button>
    </div>
  </div>

  <!-- 우: 결과 -->
  <div class="col">
    <div class="card result-col" style="flex:1;display:flex;flex-direction:column">
      <h2>분석 결과</h2>
      <div id="empty"><div class="big">🖼️</div>그림을 올리고 분석하기를 누르세요</div>
      <div id="result" class="hidden"></div>
    </div>
  </div>
</div>

<!-- history -->
<div class="histbar" id="histbar"><span class="htitle">📜 기록</span><span id="history" style="display:flex;gap:10px"></span></div>

<script>
const STAGES=["scribble_disordered","scribble_controlled","scribble_named","preschematic","schematic","dawning_realism","pseudo_naturalistic"];
const STAGE_KO={scribble_disordered:"무질서한 난화기",scribble_controlled:"통제된 난화기",scribble_named:"명명된 난화기",preschematic:"전도식기",schematic:"도식기",dawning_realism:"또래집단기",pseudo_naturalistic:"의사실기"};
const STEP_SHORT=["무질서","통제","명명","전도식","도식","또래","의사실"];
const QLABELS={object_recognizability:"인식 가능성",detail_level:"세부 묘사",proportion:"비례",completeness:"완성도",spatial_organization:"공간 구성"};
const $=s=>document.querySelector(s);
let curFile=null,curDataURL=null;

// 업로드
const drop=$("#drop"),fileInput=$("#file");
drop.onclick=()=>fileInput.click();
drop.ondragover=e=>{e.preventDefault();drop.classList.add("hover")};
drop.ondragleave=()=>drop.classList.remove("hover");
drop.ondrop=e=>{e.preventDefault();drop.classList.remove("hover");setFile(e.dataTransfer.files[0])};
fileInput.onchange=e=>setFile(e.target.files[0]);
function setFile(f){
  if(!f||!f.type.startsWith("image/"))return;
  curFile=f;
  const r=new FileReader();
  r.onload=e=>{curDataURL=e.target.result;drop.innerHTML=`<img src="${curDataURL}">`;drop.classList.add("has")};
  r.readAsDataURL(f);
  $("#run").disabled=false;
}
// 분석
$("#run").onclick=async()=>{
  if(!curFile)return;
  const btn=$("#run");btn.disabled=true;btn.textContent="분석 중...";
  $("#empty").classList.add("hidden");$("#result").classList.remove("hidden");
  $("#result").innerHTML=`<div style="flex:1;display:flex;align-items:center;justify-content:center"><div class="spinner"></div></div>`;
  try{
    const fd=new FormData();fd.append("image",curFile);fd.append("model","qwen3-vl-8b");
    const res=await fetch("/analyze",{method:"POST",body:fd});
    const data=await res.json();
    render(data);saveHist(data);
  }catch(e){$("#result").innerHTML=`<span class="err">오류: ${e}</span>`;}
  finally{btn.disabled=false;btn.textContent="분석하기";}
};
// 결과 렌더
function render(d){
  const r=d.result;
  if(!r){$("#result").innerHTML=`<span class="err">판정 실패 (${d.meta?.failure_type||"unknown"})</span>`;return;}
  const idx=STAGES.indexOf(r.stage);
  const steps=STAGES.map((s,i)=>`<div class="step ${i<idx?"done":""} ${i===idx?"cur":""}"><div class="dot"></div><div class="lab">${STEP_SHORT[i]}</div></div>`).join("");
  const q=r.quality_scores||{};
  const bars=Object.keys(QLABELS).map(k=>{const v=q[k]??0;return `<div class="qrow"><div class="top"><span>${QLABELS[k]}</span><b>${v}/5</b></div><div class="track"><i style="width:${v/5*100}%"></i></div></div>`;}).join("");
  const m=d.meta||{};
  $("#result").innerHTML=`
    <div class="stepper">${steps}</div>
    <div class="stage-head"><span class="name">${STAGE_KO[r.stage]||r.stage}</span>
      <span class="conf">신뢰도 <b>${(r.confidence*100).toFixed(0)}%</b></span></div>
    <div class="cap">📝 ${d.caption}</div>
    <div class="ev">${r.evidence}</div>
    <h2 style="margin:16px 0 8px">품질 속성</h2>
    <div class="qgrid">${bars}</div>
    <h2 style="margin:18px 0 8px">💬 피드백</h2>
    <div class="fb-placeholder">7주차에 persona별 피드백이 추가됩니다</div>
    <div class="meta"><span>${(m.model||"").split("/").pop()}</span><span>⏱ ${m.latency_ms}ms</span><span>🔤 ${m.tokens?.total} tok</span>${m.caption_cached?"<span>캡션캐시✓</span>":""}${m.failure_type?`<span>⚠ ${m.failure_type}</span>`:""}</div>`;
}
// history
function saveHist(d){
  if(!d.result)return;
  const h=JSON.parse(localStorage.getItem("hist")||"[]");
  h.unshift({ts:new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"}),thumb:curDataURL,stage:d.result.stage,conf:d.result.confidence,full:d});
  localStorage.setItem("hist",JSON.stringify(h.slice(0,15)));renderHist();
}
function renderHist(){
  const h=JSON.parse(localStorage.getItem("hist")||"[]");
  $("#history").innerHTML=h.map((x,i)=>`<div class="hchip" data-i="${i}"><img src="${x.thumb}"><div class="ht"><div class="s">${STAGE_KO[x.stage]||x.stage}</div><div class="c">${x.ts} · ${(x.conf*100).toFixed(0)}%</div></div></div>`).join("")||"<span style='color:#aab1c0;font-size:12px'>아직 없음</span>";
  document.querySelectorAll(".hchip").forEach(c=>c.onclick=()=>{
    const x=h[c.dataset.i];curDataURL=x.thumb;drop.innerHTML=`<img src="${x.thumb}">`;drop.classList.add("has");
    $("#empty").classList.add("hidden");$("#result").classList.remove("hidden");render(x.full);
  });
}
renderHist();
</script>
</body>
</html>
